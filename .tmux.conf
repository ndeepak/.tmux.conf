##### ========================================================
##### TMUX CONFIG — DEEPAK NAGARKOTI (REFINED)
##### Minimal • Fast • Friendly • Dual Prefix
##### ========================================================


##### --------------------------------------------------------
##### 1. PREFIX KEYS (Ctrl-a + Ctrl-b)
##### --------------------------------------------------------

set -g prefix C-b
set -g prefix2 C-a

# Make Ctrl-a send prefix when pressed twice
bind C-a send-prefix


##### --------------------------------------------------------
##### 2. TPM — PLUGINS
##### --------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Better scrolling
set -g @plugin 'nhdaly/tmux-better-mouse-mode'

# Clipboard integration
set -g @plugin 'tmux-plugins/tmux-yank'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'


##### --------------------------------------------------------
##### 3. GENERAL PERFORMANCE & UX
##### --------------------------------------------------------

set -g mouse on
set -g history-limit 200000

# True color
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# Faster escape (vim friendly)
set -sg escape-time 0

# Reduce redraw lag
set -g redraw-interval 1

# Focus events (important for vim, nvim, ssh)
set -g focus-events on


##### --------------------------------------------------------
##### 4. INDEXING
##### --------------------------------------------------------

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on



##### ========================================================
##### TMUX CONFIG — DEEPAK NAGARKOTI (REFINED)
##### Minimal • Fast • Friendly • Dual Prefix
##### ========================================================



##### --------------------------------------------------------
##### 5. WINDOW CONTROL
##### --------------------------------------------------------

set -g allow-rename off
setw -g automatic-rename off

# Quick reload config
bind r source-file ~/.tmux.conf \; display "Config Reloaded"


##### --------------------------------------------------------
##### 6. COPY MODE (VIM + SYSTEM CLIPBOARD)
##### --------------------------------------------------------

setw -g mode-keys vi

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Y send -X copy-line

# Better scrolling in copy mode
bind -T copy-mode-vi WheelUpPane send -X scroll-up
bind -T copy-mode-vi WheelDownPane send -X scroll-down


##### --------------------------------------------------------
##### 7. SPLITS (INTUITIVE)
##### --------------------------------------------------------

unbind '"'
unbind %

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

##### ========================================================
##### TMUX CONFIG — DEEPAK NAGARKOTI (REFINED)
##### Minimal • Fast • Friendly • Dual Prefix
##### ========================================================



##### --------------------------------------------------------
##### 8. PANE NAVIGATION (VIM STYLE + SMART)
##### --------------------------------------------------------

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Switch panes without prefix (ALT + hjkl)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R


##### --------------------------------------------------------
##### 9. RESIZE PANES (FAST)
##### --------------------------------------------------------

bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10


##### --------------------------------------------------------
##### 10. SESSION & WINDOW NAVIGATION
##### --------------------------------------------------------

# Switch windows fast
bind -n M-Left previous-window
bind -n M-Right next-window

# Kill pane quickly
bind x kill-pane

# Kill window quickly
bind X kill-window

##### ========================================================
##### TMUX CONFIG — DEEPAK NAGARKOTI (REFINED)
##### Minimal • Fast • Friendly • Dual Prefix
##### ========================================================


##### --------------------------------------------------------
##### 11. STATUS BAR (CLEAN + USEFUL)
##### --------------------------------------------------------

set -g status-interval 3
set -g status-left-length 40
set -g status-right-length 80

set -g status-style fg=white,bg=black

# Left: session name
set -g status-left "#[fg=green]#S #[fg=white]|"

# Right: host + time
set -g status-right "#[fg=cyan]#H #[fg=white]| %Y-%m-%d %H:%M"

setw -g window-status-current-style fg=black,bg=green
setw -g window-status-style fg=white,bg=default


##### --------------------------------------------------------
##### 12. CONTINUUM (AUTO SAVE)
##### --------------------------------------------------------

set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'


##### --------------------------------------------------------
##### 13. QUALITY OF LIFE (IMPORTANT)
##### --------------------------------------------------------

# Easier pane sync (useful in pentesting labs)
bind S setw synchronize-panes

# Clear screen and history
bind C-l send-keys 'C-l' \; clear-history

# Stay in current directory when splitting
# (already handled above with -c flag)

# Fix SSH + clipboard issues
set -g set-clipboard on


##### --------------------------------------------------------
##### 14. TPM INIT (DO NOT MOVE)
##### --------------------------------------------------------

run '~/.tmux/plugins/tpm/tpm'

##### ========================================================
##### TMUX CONFIG — DEEPAK NAGARKOTI (REFINED)
##### Minimal • Fast • Friendly • Dual Prefix
##### ========================================================
